<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Translator</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌐</text></svg>" />
</head>
<body>
  <div class="app">
    <!-- ===================== Header ===================== -->
    <header class="app-header">
      <div class="brand">
        <span class="brand-icon" aria-hidden="true">🌐</span>
        <h1>AI Translator</h1>
      </div>
      <button id="theme-toggle" class="icon-btn" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
        <span id="theme-icon">🌙</span>
      </button>
    </header>

    <!-- ===================== Main translator card ===================== -->
    <main class="app-main">
      <section class="translator-card" aria-label="Translator">
        <!-- Language selector row -->
        <div class="lang-row">
          <div class="lang-select-wrap">
            <label for="source-lang" class="visually-hidden">Source language</label>
            <select id="source-lang" class="lang-select">
              {% for lang in languages %}
                <option value="{{ lang }}" {% if lang == 'Auto Detect' %}selected{% endif %}>{{ lang }}</option>
              {% endfor %}
            </select>
          </div>

          <button id="swap-btn" class="icon-btn swap-btn" type="button" aria-label="Swap languages" title="Swap languages">
            ⇄
          </button>

          <div class="lang-select-wrap">
            <label for="target-lang" class="visually-hidden">Target language</label>
            <select id="target-lang" class="lang-select">
              {% for lang in languages %}
                {% if lang != 'Auto Detect' %}
                  <option value="{{ lang }}" {% if lang == 'Spanish' %}selected{% endif %}>{{ lang }}</option>
                {% endif %}
              {% endfor %}
            </select>
          </div>
        </div>

        <!-- Text panels -->
        <div class="panels-row">
          <div class="panel">
            <textarea
              id="source-text"
              class="text-area"
              placeholder="Type or paste text to translate..."
              maxlength="5000"
              spellcheck="true"
            ></textarea>
            <div class="panel-footer">
              <span id="source-char-count" class="char-count">0 / 5000</span>
              <button id="clear-btn" class="text-btn" type="button">Clear</button>
            </div>
          </div>

          <div class="panel panel-output">
            <div id="target-text" class="text-area text-area-readonly" aria-live="polite"></div>
            <div class="panel-footer">
              <span id="detected-lang-badge" class="badge hidden"></span>
              <button id="copy-btn" class="text-btn" type="button" title="Copy translation">
                📋 Copy
              </button>
            </div>
          </div>
        </div>

        <!-- Controls -->
        <div class="controls-row">
          <div class="temperature-control">
            <label for="temperature">
              Creativity (temperature): <span id="temperature-value">0.3</span>
            </label>
            <input
              type="range"
              id="temperature"
              min="0"
              max="1"
              step="0.1"
              value="0.3"
            />
          </div>

          <button id="translate-btn" class="primary-btn" type="button">
            <span id="translate-btn-text">Translate</span>
            <span id="translate-spinner" class="spinner hidden"></span>
          </button>
        </div>

        <div id="error-banner" class="error-banner hidden" role="alert"></div>
      </section>

      <!-- ===================== History ===================== -->
      <section class="history-card" aria-label="Translation history">
        <div class="history-header">
          <h2>History</h2>
          <button id="clear-history-btn" class="text-btn" type="button">Clear all</button>
        </div>
        <ul id="history-list" class="history-list">
          <li class="history-empty" id="history-empty">No translations yet.</li>
        </ul>
      </section>
    </main>

    <footer class="app-footer">
      <p>Powered by the OpenAI Responses API &middot; Built with Flask</p>
    </footer>
  </div>

  <template id="history-item-template">
    <li class="history-item">
      <div class="history-item-meta">
        <span class="history-langs"></span>
        <span class="history-time"></span>
      </div>
      <p class="history-source"></p>
      <p class="history-target"></p>
      <div class="history-item-actions">
        <button class="text-btn reuse-btn" type="button">Reuse</button>
        <button class="text-btn delete-btn" type="button">Delete</button>
      </div>
    </li>
  </template>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
